<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shiblu & Tania's Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #ffffff;
  --text: #333;
  --emerald: #046c4e;
  --rose: #b76e79;
}

body.dark {
  --bg: #111;
  --text: #eee;
}

body {
  margin:0;
  font-family:Poppins;
  background:var(--bg);
  color:var(--text);
  transition:.4s;
}

/* HERO */
.hero {
  height:100vh;
  background:url('https://images.unsplash.com/photo-1522673607200-164d1b6ce486') center/cover;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  text-align:center;
}

/* COUNTDOWN */
#countdown {
  font-size:1.5rem;
  margin-top:15px;
}

/* SCRATCH CARD */
#scratch {
  width:300px;
  height:150px;
  margin:30px auto;
  background:#ccc;
  position:relative;
}

#dateText {
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:1.5rem;
  font-family:Playfair Display;
}

/* WISH WALL */
#wishes {
  height:200px;
  overflow:hidden;
}

.wish {
  padding:10px;
  border-bottom:1px solid #ddd;
}

/* PETALS */
.petal {
  position:fixed;
  top:-10px;
  width:10px;
  height:10px;
  background:pink;
  border-radius:50%;
  animation:fall linear infinite;
}

@keyframes fall {
  to {
    transform:translateY(100vh);
  }
}

/* TOGGLE */
.toggle {
  position:fixed;
  top:20px;
  right:20px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="toggle" onclick="toggleTheme()">🌗</div>

<section class="hero">
  <div>
    <h1>Starting Our Forever</h1>
    <div id="countdown"></div>
  </div>
</section>

<!-- SCRATCH DATE -->
<section>
  <h2 style="text-align:center">Reveal the Date</h2>
  <canvas id="scratch" width="300" height="150"></canvas>
  <div id="dateText">June 10, 2026</div>
</section>

<!-- RSVP -->
<section>
  <h2>RSVP</h2>
  <form id="rsvpForm">
    <input placeholder="Name" id="name" required><br>
    <input placeholder="Email" id="email" required><br>
    <textarea placeholder="Message" id="message"></textarea><br>
    <button>Send</button>
  </form>
</section>

<!-- WISH WALL -->
<section>
  <h2>Send Your Wishes</h2>
  <form id="wishForm">
    <input id="wishInput" placeholder="Write your wish...">
    <button>Add</button>
  </form>

  <div id="wishes"></div>
</section>

<!-- MUSIC -->
<audio autoplay loop>
  <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_c8a4.mp3" type="audio/mpeg">
</audio>

<script>
// ================== CONFIG ==================
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwGnjgPeLGui6zBVl6c2ge4Ry_fcvKfLZQXmXKDYANaB8WN3U8y5_QFr1jOpSqAjEKTuA/exec";
const weddingDate = new Date("June 10, 2026 12:00:00");

// ================== COUNTDOWN ==================
setInterval(() => {
  let diff = weddingDate - new Date();
  let d = Math.floor(diff/1000/60/60/24);
  let h = Math.floor(diff/1000/60/60)%24;
  let m = Math.floor(diff/1000/60)%60;
  document.getElementById("countdown").innerText =
    `${d} Days ${h} Hours ${m} Minutes`;
},1000);

// ================== RSVP ==================
document.getElementById("rsvpForm").onsubmit = e => {
  e.preventDefault();

  fetch(SCRIPT_URL, {
    method:"POST",
    body:JSON.stringify({
      name: name.value,
      email: email.value,
      message: message.value
    })
  }).then(()=> alert("RSVP Sent 💖"));
};

// ================== WISH WALL ==================
const wishes = document.getElementById("wishes");

document.getElementById("wishForm").onsubmit = e => {
  e.preventDefault();
  let text = wishInput.value;
  let div = document.createElement("div");
  div.className="wish";
  div.innerText = text;
  wishes.appendChild(div);
  wishInput.value="";
};

// auto scroll
setInterval(()=>{
  wishes.scrollTop += 1;
},50);

// ================== PETALS ==================
setInterval(()=>{
  let p=document.createElement("div");
  p.className="petal";
  p.style.left=Math.random()*100+"vw";
  p.style.animationDuration=(3+Math.random()*3)+"s";
  document.body.appendChild(p);
  setTimeout(()=>p.remove(),6000);
},300);

// ================== THEME ==================
function toggleTheme(){
  document.body.classList.toggle("dark");
}

// ================== SCRATCH ==================
const canvas = document.getElementById("scratch");
const ctx = canvas.getContext("2d");

ctx.fillStyle = "#999";
ctx.fillRect(0,0,300,150);

canvas.addEventListener("mousemove", e=>{
  if(e.buttons===1){
    ctx.clearRect(e.offsetX, e.offsetY, 20, 20);
  }
});
</script>

</body>
</html>
