<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
<title>Wedding Invitation</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #fff;
  color: #333;
  overflow-x: hidden;
}

/* HERO */
.hero {
  height: 100vh;
  background: url('https://images.unsplash.com/photo-1542042161784-26ab9e041e89?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D') center/cover;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: white;
  text-align: center;
}

.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: 48px;
}

.hero button {
  padding: 12px 25px;
  border: none;
  background: gold;
  cursor: pointer;
  margin-top: 20px;
}

/* MAIN CONTENT */
.main {
  display: none;
  padding: 20px;
  animation: fadeIn 1s ease;
}

@keyframes fadeIn {
  from {opacity: 0;}
  to {opacity: 1;}
}

.section {
  margin: 60px 0;
  text-align: center;
}

/* COUNTDOWN */
.countdown {
  font-size: 22px;
}

/* TIMELINE */
.timeline {
  max-width: 600px;
  margin: auto;
  text-align: left;
}

/* RSVP */
input, select {
  padding: 10px;
  margin: 10px;
  width: 80%;
}

button.submit {
  background: black;
  color: white;
}

/* MUSIC BUTTON */
.music {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: black;
  color: white;
  padding: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- HERO -->
<h1 data-aos="zoom-in">Shiblu & Tania</h1>
<p data-aos="fade-up" data-aos-delay="300">We are getting married</p>
<button data-aos="fade-up" data-aos-delay="600" onclick="openInvite()">Open Invitation</button>

<!-- MAIN CONTENT -->
<div class="main" id="mainContent">

  <!-- COUNTDOWN -->
  <div class="section" data-aos="fade-up">
  <h2>Countdown</h2>
  <div class="countdown" id="countdown"></div>
</div>

  <!-- STORY -->
  <div class="timeline">
  <p data-aos="fade-right">💖 2019 – We met</p>
  <p data-aos="fade-left">💖 2022 – Fell in love</p>
  <p data-aos="fade-right">💖 2026 – Getting married</p>
</div>

  <!-- EVENTS -->
<div class="section" data-aos="fade-up">
  <h2>Wedding Events</h2>
  <p>📅 Date: 20 December 2026</p>
  <p>📍 Location: Sylhet, Bangladesh</p>
</div>

  <!-- MAP -->
  <div class="section">
    <h2>Location</h2>
 <div class="section" data-aos="fade-up"></div>
  </div>

  <!-- RSVP -->
  <div class="section">
    <h2>RSVP</h2>
    <input type="text" placeholder="Your Name"><br>
    <select>
      <option>Will you attend?</option>
      <option>Yes</option>
      <option>No</option>
    </select><br>
    <button class="submit">Submit</button>
  </div>

</div>

<!-- MUSIC -->
<div class="music" onclick="toggleMusic()">🎵</div>
<audio id="music" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-love.mp3" type="audio/mp3">
</audio>

<script>
function openInvite() {
  document.querySelector('.hero').style.display = 'none';
  document.getElementById('mainContent').style.display = 'block';
}

/* COUNTDOWN */
const countdown = document.getElementById('countdown');
const weddingDate = new Date("Dec 20, 2026 00:00:00").getTime();

setInterval(() => {
  const now = new Date().getTime();
  const gap = weddingDate - now;

  const d = Math.floor(gap / (1000*60*60*24));
  const h = Math.floor((gap % (1000*60*60*24)) / (1000*60*60));
  const m = Math.floor((gap % (1000*60*60)) / (1000*60));

  countdown.innerHTML = `${d} Days ${h} Hours ${m} Minutes`;
}, 1000);

/* MUSIC */
let playing = false;
function toggleMusic() {
  const music = document.getElementById('music');
  if (!playing) {
    music.play();
    playing = true;
  } else {
    music.pause();
    playing = false;
  }
}
</script>
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
AOS.init({
  duration: 1200,
  once: true
});
</script>
</body>
</html>
